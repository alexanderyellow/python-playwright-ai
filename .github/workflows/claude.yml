name: Claude Code
permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

on:
  issue_comment:
    types: [ created ]
  pull_request_review_comment:
    types: [ created ]
  issues:
    types: [ opened, assigned ]
  pull_request:
    types: [ opened, assigned ]

jobs:
  # Phase 1: Analyze and propose changes (read-only, no edits)
  claude-analyze:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Analyze and propose changes
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 25
            --allowedTools "Read,Glob,Grep,Bash(uv run pytest),Bash(uv run pytest -n=3)"
          custom_instructions: |
            You are in ANALYSIS-ONLY mode. Do NOT edit, write, or create any files.
            Your job is to:
            1. Read and analyze the code changes or issue description.
            2. Identify problems, suggest improvements, or propose an implementation plan.
            3. Post your findings as a comment with a clear summary of proposed changes.
            4. End your comment with: "Reply `@claude apply` to approve and apply these changes."

  # Phase 2: Apply changes (triggered by "@claude apply" comment)
  claude-apply:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 25
            --allowedTools "Bash(uv run pytest),Bash(uv run pytest -n=3)"
