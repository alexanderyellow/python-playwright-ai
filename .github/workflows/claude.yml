name: Claude Code

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

on:
  issue_comment:
    types: [ created ]
  pull_request_review_comment:
    types: [ created ]
  pull_request_review:
    types: [ submitted ]
  pull_request:
    types: [ opened, synchronize, edited, review_requested, assigned ]

jobs:
  # Phase 1: Analyze and propose changes (read-only, no edits)
  check:
    runs-on: ubuntu-latest
    steps:
      - name: print
        run: |
          echo "Triggered by event: ${{ github.event_name }}"
          echo "Action: ${{ github.event.action }}"
          echo "Comment body: ${{ github.event.review.body }}"
          echo "Hello from the GitHub Actions runner! 🚀"
  claude-analyze:
    if: |
      github.event_name == 'pull_request_review' &&
      contains(github.event.review.body, '@claude') &&
      !contains(github.event.review.body, '@claude apply')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout PR branch (if triggered by comment)
        if: github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # GitHub Actions runs comments on `main`. We must pull down the PR branch.
        run: gh pr checkout ${{ github.event.issue.number || github.event.pull_request.number }}

      - name: Analyze and propose changes
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are in ANALYSIS-ONLY mode. Do NOT edit, write, or create any files.
            Your job is to:
            1. Read and analyze the code changes or the user's comment in this thread.
            2. Identify problems, suggest improvements, or propose an implementation plan.
            3. Post your findings as a comment with a clear summary of proposed changes.
            4. End your comment with: "Reply `@claude apply` to approve and apply these changes."
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 25
            --allowedTools "Read,Glob,Grep,Bash(uv run pytest),Bash(uv run pytest -n=3)"

  # Phase 2: Apply changes (triggered by "@claude apply" comment)
  claude-apply:
    if: |
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
      (github.event.issue.pull_request != null || github.event.pull_request != null) &&
      contains(github.event.comment.body, '@claude apply')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Checkout PR branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr checkout ${{ github.event.issue.number || github.event.pull_request.number }}

      - name: Run Claude Code (Apply Mode)
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are in APPLY mode. 
            1. Read the previous conversation in this PR thread.
            2. Implement the exact changes that were previously proposed and just approved by the user.
            3. Use your file editing tools to safely make these modifications to the codebase.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 25
            --allowedTools "Edit,Write,Replace,Read,Glob,Grep,Bash(uv run pytest),Bash(uv run pytest -n=3)"

      - name: Commit and Push Changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          
          # Check if Claude actually modified anything before trying to commit
          if ! git diff-index --quiet HEAD; then
            git commit -m "Apply Claude's proposed changes"
            git push
          else
            echo "No changes were made by Claude."
          fi