name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff check
        run: uv run ruff check tests/

      - name: Black check
        run: uv run black --check tests/

      - name: Mypy
        run: uv run mypy tests/

  test:
    name: Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        browser: [ chromium, firefox ]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps ${{ matrix.browser }}

      - name: Run tests
        run: uv run pytest --alluredir=allure-results
        env:
          PW_BROWSER: ${{ matrix.browser }}

      - name: Upload allure results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results-${{ matrix.browser }}
          path: allure-results/
          retention-days: 30

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-${{ matrix.browser }}
          path: test-results/
          retention-days: 30

  allure-report:
    name: Allure Report
    runs-on: ubuntu-latest
    needs: test
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - name: Upload Playwright Traces
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-traces
          path: build/playwright-traces/
          retention-days: 7

      - name: Generate Allure Report
        if: always()
        run: ./gradlew allureReport

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results
          path: build/allure-results
          retention-days: 20

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-report
          path: build/reports/allure-report
          retention-days: 20
